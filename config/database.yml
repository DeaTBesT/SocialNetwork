
default: &default
  adapter: postgresql
  encoding: unicode
  username: social_network
  password: 1234
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>


development:
  <<: *default
  database: social_network_development

test:
  <<: *default
  database: social_network_test

production:
  primary: &primary_production
    <<: *default
    database: social_network_production
    username: social_network
    password: <%= ENV["SOCIAL_NETWORK_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: social_network_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: social_network_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: social_network_production_cable
    migrations_paths: db/cable_migrate
